services:
  db:
    image: postgres:15-alpine
    container_name: aggregateapi_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aggregateapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aggregateapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aggregateapi_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/aggregateapi?schema=public"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://aapi.togomol.com}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-super-secret-key-for-nextauth-dev}"
      AUTH_SECRET: "${AUTH_SECRET:-super-secret-key-for-nextauth-dev}"
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "${AUTH_URL:-https://aapi.togomol.com}"
      # Required for encrypting provider API keys at rest. CHANGE IN PRODUCTION.
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-dev-only-encryption-key-change-me-in-production}"
      # Google OAuth
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      # Payment gateways
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: "${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}"
      PAYPAL_CLIENT_ID: "${PAYPAL_CLIENT_ID:-}"
      PAYPAL_CLIENT_SECRET: "${PAYPAL_CLIENT_SECRET:-}"
      ALIPAY_APP_ID: "${ALIPAY_APP_ID:-}"
      ALIPAY_PRIVATE_KEY: "${ALIPAY_PRIVATE_KEY:-}"
      ALIPAY_PUBLIC_KEY: "${ALIPAY_PUBLIC_KEY:-}"
      ALIPAY_WEBHOOK_URL: "${ALIPAY_WEBHOOK_URL:-}"
      # Admin account (used by ensure-admin.js on first startup)
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@aggregateapi.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
